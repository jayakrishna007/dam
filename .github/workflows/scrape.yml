name: Daily Dam Scraper

on:
  schedule:
    # 10:00 AM IST is 4:30 AM UTC (10:00 - 5:30 = 4:30)
    - cron: '30 4 * * *'
  workflow_dispatch: # Allows manual trigger from the Actions tab on GitHub

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to commit and push changes back to the repository

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pypdf

      - name: Run Scraper Script
        run: python scripts/scrape_dams.py

      - name: Commit and push updates
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/dams.json src/data/scrape_status.json
          # Only commit if there are changes to the water level data or run status
          if ! git diff --cached --quiet; then
            git commit -m "chore: auto-update dam levels (10:00 AM IST)"
            git push
          else
            echo "No changes in water level data."
          fi
